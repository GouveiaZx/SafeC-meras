version: '3.8'

services:


  # Backend API - CORRIGIDO PARA PORTA 3002
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newcam_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3002

      - JWT_SECRET=9QqL3M2K7vHQexkbfp6RvbCUB3GkV4MK
      - ZLM_SECRET=035c73f7-bb6b-4889-a715-d9eb2d1925cc
      - ZLM_BASE_URL=http://zlmediakit:80
      - ZLM_API_URL=http://zlmediakit:80/index/api
      - ZLMEDIAKIT_API_URL=http://zlmediakit:80
      - ZLMEDIAKIT_SECRET=9QqL3M2K7vHQexkbfp6RvbCUB3GkV4MK
      - RECORDINGS_PATH=/app/storage/recordings
      - EXPORTS_PATH=/app/storage/exports
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=newcam-internal-service-2025
      - SUPABASE_URL=https://grkvfzuadctextnbpajb.supabase.co
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdya3ZmenVhZGN0ZXh0bmJwYWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMyMjQyMzgsImV4cCI6MjA2ODgwMDIzOH0.Simv8hH8aE9adQiTf6t1BZIcMPniNh9ecpjxEeki4mE
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdya3ZmenVhZGN0ZXh0bmJwYWpiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1MzIyNDIzOCwiZXhwIjoyMDY4ODAwMjM4fQ.XJoPu5InA_s3pfryZfSChBqZnu7zBV3vwH7ZM4jf04M
    ports:
      - "3002:3002"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/uploads:/app/uploads

    networks:
      - newcam_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - CORRIGIDO PARA PORTA 3000
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newcam_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://66.94.104.241:3002
      - VITE_ZLM_URL=http://66.94.104.241:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - newcam_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker - Cliente que se conecta ao backend
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: newcam_worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:3002
      - WORKER_TOKEN=newcam-worker-token-2025
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=https://grkvfzuadctextnbpajb.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdya3ZmenVhZGN0ZXh0bmJwYWpiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1MzIyNDIzOCwiZXhwIjoyMDY4ODAwMjM4fQ.XJoPu5InA_s3pfryZfSChBqZnu7zBV3vwH7ZM4jf04M
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      - backend
      - redis
    networks:
      - newcam_network

  # ZLMediaKit - CORRIGIDO PARA PORTA 8000
  zlmediakit:
    image: panjjo/zlmediakit:latest
    container_name: newcam_zlmediakit
    restart: unless-stopped
    environment:
      - ZLM_SECRET=9QqL3M2K7vHQexkbfp6RvbCUB3GkV4MK

    ports:
      - "8000:80"      # HTTP API
      - "554:554"      # RTSP
      - "1935:1935"    # RTMP
      - "8080:80"      # HLS/HTTP-FLV (corrigido para porta 80 interna)
    volumes:
      - ./docker/zlmediakit/config.ini:/opt/media/conf/config.ini
      - ./storage/www:/opt/media/bin/www
      - ./storage/www/recordings:/opt/media/www/recordings
    networks:
      - newcam_network
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep MediaServer | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    container_name: newcam_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - newcam_network

volumes:
  redis_data:

networks:
  newcam_network:
    driver: bridge
