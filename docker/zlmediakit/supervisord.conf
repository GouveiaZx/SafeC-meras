[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:zlmediakit]
command=/opt/media/bin/MediaServer -c /opt/media/conf/config.ini
directory=/opt/media/bin
autorestart=true
stdout_logfile=/var/log/supervisor/zlmediakit.log
stderr_logfile=/var/log/supervisor/zlmediakit_error.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_backups=3
priority=100

[program:registrar]
command=python registrar.py
directory=/app
autorestart=true
stdout_logfile=/var/log/supervisor/registrar.log
stderr_logfile=/var/log/supervisor/registrar_error.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_backups=3
priority=200

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface